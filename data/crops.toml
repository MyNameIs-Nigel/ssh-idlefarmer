# Crop definitions for ssh-idlefarmer.
#
# Every crop needs: id, name, archetype, seed_cost, grow_seconds, sell_value.
# Archetypes: "fast" (cheap staple), "slow" (patient payoff), "risky" (variance).
# Risky crops additionally set fail_chance_pct / fail_value and
# bonus_chance_pct / bonus_value (percentages are integers 0-100).
#
# unlock: how the crop becomes plantable.
#   kind = "start"            available from the first run
#   kind = "earnings", value  lifetime run earnings reach `value` coins
#   kind = "prestige", value  total rebirths reach `value`
#   kind = "zone", zone       owning the named zone unlocks it

[[crop]]
id = "turnip"
name = "Turnip"
archetype = "fast"
seed_cost = 5
grow_seconds = 60
sell_value = 9
unlock = { kind = "start" }

