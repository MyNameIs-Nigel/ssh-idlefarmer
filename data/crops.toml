# Crop definitions for ssh-idlefarmer.
#
# Profit-per-second increases with grow time (patience pays).
# Risky crops: fail_chance_pct chance of salvage (1/8 sell by default),
# otherwise full sell value. Hardier Strain upgrades improve salvage.
#
# unlock kinds: start, earnings, prestige, zone

