# Run-scoped multipliers (Market tab, bought with coins).
[[multiplier]]
id = "fertilizer"
name = "Fertilizer"
description = "Crops grow 8% faster per level this run."
cost = 200
cost_growth_pct = 250
max_level = 3
effect = "grow_speed_pct"
effect_value = 8

[[multiplier]]
id = "merchant_scale"
name = "Merchant's Scale"
description = "Crops sell for 10% more per level this run."
cost = 300
cost_growth_pct = 250
max_level = 3
effect = "sell_bonus_pct"
effect_value = 10

# Hardier Strain upgrades for risky crops (Market tab).
[[seed_upgrade]]
id = "glimmercorn_strain"
crop_id = "glimmercorn"
name = "Hardier Glimmercorn"
description = "Failed harvests salvage more (1/4 → 1/2 → 3/4 of sell value)."
cost = 150
cost_growth_pct = 200
max_level = 3

[[seed_upgrade]]
id = "moonberry_strain"
crop_id = "moonberry"
name = "Hardier Moonberry"
description = "Failed harvests salvage more (1/4 → 1/2 → 3/4 of sell value)."
cost = 400
cost_growth_pct = 200
max_level = 3

[[seed_upgrade]]
id = "thunderpod_strain"
crop_id = "thunderpod"
name = "Hardier Thunderpod"
description = "Failed harvests salvage more (1/4 → 1/2 → 3/4 of sell value)."
cost = 250
cost_growth_pct = 200
max_level = 3

[[zone]]
id = "greenhouse"
name = "Greenhouse"
description = "A warm glass annex. +6 plots and exotic crops."
