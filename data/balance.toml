# Tunable balance for ssh-idlefarmer. All money values are integer coins.

[start]
coins = 25
plots = 3

[land]
base_plot_cost = 50
growth_pct = 170
max_plots = 24

[prestige]
divisor = 100
min_earnings = 10000

[labels]
starseed_name = "Starseeds"
starseed_desc = "Cosmic seeds earned when a life returns to the soil."

# Permanent upgrades bought with Starseeds (Progress tab).
[[upgrade]]
id = "growth"
name = "Rich Soil"
description = "Crops grow 10% faster per level."
cost = 2
cost_growth_pct = 200
max_level = 5
effect = "grow_speed_pct"
effect_value = 10

[[upgrade]]
id = "haggling"
name = "Market Haggling"
description = "Crops sell for 15% more per level."
cost = 3
cost_growth_pct = 200
max_level = 5
effect = "sell_bonus_pct"
effect_value = 15

[[upgrade]]
id = "inheritance"
name = "Inheritance"
description = "Start each run with 150 extra coins per level."
cost = 1
cost_growth_pct = 300
max_level = 4
effect = "start_coins"
effect_value = 150

[[upgrade]]
id = "surveying"
name = "Surveying"
description = "New plots cost 10% less per level."
cost = 2
cost_growth_pct = 200
max_level = 4
effect = "plot_discount_pct"
effect_value = 10

[[upgrade]]
id = "gift_magnet"
name = "Gift Magnet"
